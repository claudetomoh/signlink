<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Ashesi DASS Splash Screen</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003366",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display">
    <!-- Splash Screen Container -->
    <div class="relative flex h-screen w-full flex-col items-center justify-between bg-primary overflow-hidden p-8">
        <!-- Decorative Background Element (Subtle Gradient) -->
        <div class="absolute inset-0 opacity-10 pointer-events-none">
            <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-white rounded-full blur-[120px]"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-white rounded-full blur-[120px]"></div>
        </div>
        <!-- Top Spacer for centering -->
        <div class="flex-1"></div>
        <!-- Central Branding Content -->
        <div class="flex flex-col items-center gap-8 w-full max-w-xs animate-in fade-in duration-700">
            <!-- Logo Placeholder -->
            <div class="w-32 h-32 flex items-center justify-center bg-white/10 rounded-xl backdrop-blur-sm border border-white/20 p-6 shadow-2xl">
                <div class="text-white flex size-20 shrink-0 items-center justify-center" data-icon="school">
                    <span class="material-symbols-outlined !text-7xl" style="">school</span>
                </div>
            </div>
            <!-- App Title and Brand -->
            <div class="text-center space-y-2">
                <h2 class="text-white/80 text-lg font-medium tracking-widest uppercase" style="">Ashesi University</h2>
                <h1 class="text-white text-5xl font-bold tracking-tight" style="">SignLink</h1>
            </div>
            <!-- Subtle Loading Indicator -->
            <div class="w-full max-w-[200px] mt-4">
                <div class="flex flex-col gap-2">
                    <div class="h-1 w-full bg-white/20 rounded-full overflow-hidden">
                        <div class="h-full bg-white rounded-full w-1/3 shadow-[0_0_8px_rgba(255,255,255,0.6)]"></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Bottom Tagline -->
        <div class="flex-1 flex items-end pb-12">
            <div class="flex flex-col items-center gap-4">
                <p class="text-white/60 text-sm font-medium tracking-[0.2em] uppercase" style="">Inclusive Excellence</p>
                <!-- Small Accessibility Icon -->
                <div class="text-white/40 flex items-center justify-center">
                    <span class="material-symbols-outlined !text-xl" style="">accessibility_new</span>
                </div>
            </div>
        </div>
    </div>
    <!-- Hidden Image Data Alt Tags (for compliance) -->
    <div style="display:none">
        <div data-alt="Abstract deep blue professional background with soft light leaks"></div>
        <div data-alt="Minimalist white academic crest icon representing Ashesi University"></div>
    </div>
    <script>
        setTimeout(function() {
            window.location.href = '../login_screen/code.html';
        }, 3000);
    </script>
</body>

</html>
