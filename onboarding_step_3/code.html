<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Ashesi DASS - Stay Connected</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003366",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center">
    <div class="relative flex h-full min-h-screen w-full max-w-md flex-col bg-white dark:bg-slate-900 shadow-xl overflow-hidden">
        <!-- Header / Navigation -->
        <div class="flex items-center bg-transparent p-4 justify-between absolute top-0 w-full z-10">
            <button aria-label="Go back" class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
            <div class="px-4 py-2">
                <span class="text-primary font-bold text-sm tracking-widest uppercase">Step 3 of 3</span>
            </div>
        </div>
        <!-- Content Area -->
        <div class="flex-1 flex flex-col items-center justify-center px-8 pt-20">
            <!-- Illustration Area -->
            <div class="w-full aspect-square flex items-center justify-center mb-12 relative">
                <!-- Decorative Background Circles -->
                <div class="absolute w-64 h-64 bg-primary/5 dark:bg-primary/20 rounded-full animate-pulse"></div>
                <div class="absolute w-48 h-48 bg-primary/10 dark:bg-primary/30 rounded-full"></div>
                <!-- Main Illustration Icons -->
                <div class="relative flex items-center justify-center">
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-lg transform -rotate-12 translate-x-[-10%] z-20">
                        <span class="material-symbols-outlined text-primary text-6xl" style="font-variation-settings: 'FILL' 1">chat_bubble</span>
                    </div>
                    <div class="bg-primary p-6 rounded-2xl shadow-xl transform rotate-12 translate-x-[10%] z-30">
                        <span class="material-symbols-outlined text-white text-6xl" style="font-variation-settings: 'FILL' 1">videocam</span>
                    </div>
                </div>
                <!-- Accessibility/DASS Specific Accents -->
                <div class="absolute bottom-4 right-12 bg-emerald-500 p-3 rounded-full shadow-md z-40">
                    <span class="material-symbols-outlined text-white text-2xl">sign_language</span>
                </div>
            </div>
            <!-- Text Content -->
            <div class="text-center space-y-4">
                <h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight">Stay Connected</h1>
                <p class="text-slate-600 dark:text-slate-400 text-base leading-relaxed">
                    Chat with your interpreters and join video calls for seamless communication on campus.
                </p>
            </div>
            <!-- Progress Indicators -->
            <div class="flex w-full flex-row items-center justify-center gap-3 mt-10">
                <div class="h-2 w-2 rounded-full bg-slate-200 dark:bg-slate-700"></div>
                <div class="h-2 w-2 rounded-full bg-slate-200 dark:bg-slate-700"></div>
                <div class="h-2 w-10 rounded-full bg-primary transition-all duration-300"></div>
            </div>
        </div>
        <!-- Footer Action -->
        <div class="p-8 w-full mt-auto">
            <a href="../login_screen/code.html" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                <span>Get Started</span>
                <span class="material-symbols-outlined">rocket_launch</span>
            </a>
            <p class="text-center text-slate-400 dark:text-slate-500 text-xs mt-6">
                By clicking "Get Started", you agree to the Ashesi DASS Terms of Service.
            </p>
        </div>
        <!-- Bottom Safe Area Spacer -->
        <div class="h-4 bg-white dark:bg-slate-900"></div>
    </div>
    <!-- Hidden placeholders for required alt text attributes as per instructions -->
    <div class="hidden">
        <div data-alt="Two stylized floating cards showing a chat bubble and a video camera icon representing communication"></div>
    </div>
</body>

</html>
