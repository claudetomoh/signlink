<span class="material-symbols-outlined">attach_file</span>

    <script>
        const BASE_URL = 'http://169.239.251.102:280/~tomoh.ikfingeh/uploads';

        // Get conversationId from URL param (?conv=ID) or fall back to 1 for demo
        const params = new URLSearchParams(location.search);
        const CONV_ID = params.get('conv') || '1';

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            const token = localStorage.getItem('sl_token');
            if (!token) {
                location.href = '../login_screen/code.html';
                return;
            }

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            input.value = '';

            // Optimistically append message to UI
            appendMessage(text, true);

            try {
                const res = await fetch(`${BASE_URL}/api/messages/send.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token,
                    },
                    body: JSON.stringify({
                        conversationId: CONV_ID,
                        text
                    }),
                });
                if (!res.ok) {
                    const data = await res.json();
                    console.error('Send error:', data.error);
                }
            } catch (ex) {
                console.error('Send failed:', ex);
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }

        function appendMessage(text, isSent) {
            const main = document.querySelector('main');
            if (!main) return;
            const user = JSON.parse(localStorage.getItem('sl_user') || '{}');
            const wrap = document.createElement('div');
            wrap.className = isSent ?
                'flex flex-col items-end gap-1 px-4 mb-4' :
                'flex flex-col items-start gap-1 px-4 mb-4';
            const now = new Date();
            const time = now.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });
            wrap.innerHTML = `
                <div class="max-w-[78%] ${
                    isSent
                        ? 'bg-primary text-white rounded-2xl rounded-br-sm'
                        : 'bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 rounded-2xl rounded-bl-sm'
                } px-4 py-2.5 shadow-sm">
                    <p class="text-[15px] leading-relaxed">${escapeHtml(text)}</p>
                </div>
                <span class="text-[11px] text-slate-400">${time}</span>`;
            main.appendChild(wrap);
            main.scrollTop = main.scrollHeight;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
