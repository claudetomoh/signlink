<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Request Interpreter - Step 1</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003366",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .radio-card:checked+.card-content {
            border-color: #003366;
            background-color: rgba(0, 51, 102, 0.04);
        }
        
        .radio-card:checked+.card-content .check-icon {
            display: block;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Header Navigation -->
    <header class="sticky top-0 z-10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center justify-between px-4 h-16 max-w-2xl mx-auto w-full">
            <a href="../student_dashboard_1/code.html" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-700 dark:text-slate-300">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="text-lg font-bold tracking-tight">Request Interpreter</h1>
            <div class="w-10"></div>
            <!-- Spacer for centering title -->
        </div>
    </header>
    <main class="flex-1 max-w-2xl mx-auto w-full px-4 pb-32">
        <!-- Progress Indicator -->
        <div class="py-6">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-semibold text-primary dark:text-blue-400">Step 1 of 4</span>
                <span class="text-sm text-slate-500">25% Complete</span>
            </div>
            <div class="h-2 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                <div class="h-full bg-primary rounded-full" style="width: 25%;"></div>
            </div>
        </div>
        <!-- Title Section -->
        <div class="mb-8">
            <h2 class="text-2xl md:text-3xl font-bold leading-tight text-slate-900 dark:text-white mb-2">
                What do you need an interpreter for?
            </h2>
            <p class="text-slate-600 dark:text-slate-400">Select the event type that best matches your request.</p>
        </div>
        <!-- Selection Cards -->
        <div class="space-y-4">
            <!-- Option 1 -->
            <label class="relative block cursor-pointer group">
<input class="peer sr-only radio-card" name="event_type" type="radio" value="regular_class"/>
<div class="card-content flex items-center p-5 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 transition-all hover:border-primary/50 peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary">
<div class="flex-shrink-0 w-12 h-12 flex items-center justify-center rounded-lg bg-primary/10 text-primary dark:bg-primary/20 dark:text-blue-300">
<span class="material-symbols-outlined text-3xl">school</span>
</div>
<div class="ml-4 flex-1">
<h3 class="font-bold text-slate-900 dark:text-white">Regular Class</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">For your recurring academic schedule</p>
</div>
<div class="check-icon hidden text-primary">
<span class="material-symbols-outlined font-bold">check_circle</span>
</div>
</div>
</label>
            <!-- Option 2 -->
            <label class="relative block cursor-pointer group">
<input class="peer sr-only radio-card" name="event_type" type="radio" value="campus_event"/>
<div class="card-content flex items-center p-5 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 transition-all hover:border-primary/50 peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary">
<div class="flex-shrink-0 w-12 h-12 flex items-center justify-center rounded-lg bg-primary/10 text-primary dark:bg-primary/20 dark:text-blue-300">
<span class="material-symbols-outlined text-3xl">campaign</span>
</div>
<div class="ml-4 flex-1">
<h3 class="font-bold text-slate-900 dark:text-white">Campus Event</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Workshops, lectures, or social events</p>
</div>
<div class="check-icon hidden text-primary">
<span class="material-symbols-outlined font-bold">check_circle</span>
</div>
</div>
</label>
            <!-- Option 3 -->
            <label class="relative block cursor-pointer group">
<input class="peer sr-only radio-card" name="event_type" type="radio" value="meeting"/>
<div class="card-content flex items-center p-5 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 transition-all hover:border-primary/50 peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary">
<div class="flex-shrink-0 w-12 h-12 flex items-center justify-center rounded-lg bg-primary/10 text-primary dark:bg-primary/20 dark:text-blue-300">
<span class="material-symbols-outlined text-3xl">groups</span>
</div>
<div class="ml-4 flex-1">
<h3 class="font-bold text-slate-900 dark:text-white">Meeting/Office Hours</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">One-on-one sessions with faculty or staff</p>
</div>
<div class="check-icon hidden text-primary">
<span class="material-symbols-outlined font-bold">check_circle</span>
</div>
</div>
</label>
            <!-- Option 4 -->
            <label class="relative block cursor-pointer group">
<input class="peer sr-only radio-card" name="event_type" type="radio" value="other"/>
<div class="card-content flex items-center p-5 rounded-xl border-2 border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 transition-all hover:border-primary/50 peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary">
<div class="flex-shrink-0 w-12 h-12 flex items-center justify-center rounded-lg bg-primary/10 text-primary dark:bg-primary/20 dark:text-blue-300">
<span class="material-symbols-outlined text-3xl">add_circle</span>
</div>
<div class="ml-4 flex-1">
<h3 class="font-bold text-slate-900 dark:text-white">Other</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Anything else not listed above</p>
</div>
<div class="check-icon hidden text-primary">
<span class="material-symbols-outlined font-bold">check_circle</span>
</div>
</div>
</label>
        </div>
    </main>
    <!-- Bottom Action Bar -->
    <footer class="fixed bottom-0 inset-x-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 p-4 md:p-6">
        <div class="max-w-2xl mx-auto">
            <!-- Note: Button shows as disabled by default until selection logic (simulated by CSS or simply UI state) -->
            <a href="../request_interpreter_step_2/code.html" class="w-full bg-primary text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Next Step
                <span class="material-symbols-outlined">arrow_forward</span>
</a>
            <!-- Subtext or secondary action could go here -->
            <p class="text-center text-xs text-slate-400 mt-3 dark:text-slate-500">
                You can review and edit your request at the final step.
            </p>
        </div>
    </footer>
</body>

</html>
