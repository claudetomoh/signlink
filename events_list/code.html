<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Upcoming Events - SignLink</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003366",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: max(884px, 100dvh);
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">

    <!-- Top Header -->
    <header class="sticky top-0 z-10 bg-white dark:bg-background-dark border-b border-slate-100 dark:border-slate-800 px-4 py-4">
        <div class="flex items-center justify-between max-w-md mx-auto">
            <a href="../student_dashboard_2/code.html" class="flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-700 dark:text-slate-300">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="text-lg font-bold tracking-tight">Inclusion Events</h1>
            <button class="flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-600 dark:text-slate-400">
      <span class="material-symbols-outlined">tune</span>
    </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 pb-28">

        <!-- Filter Tabs -->
        <div class="flex gap-2 py-4 overflow-x-auto hide-scrollbar">
            <button id="tabAll" onclick="setTab('all')" class="flex-none px-4 py-2 rounded-full bg-primary text-white text-xs font-bold">All Events</button>
            <button id="tabUpcoming" onclick="setTab('upcoming')" class="flex-none px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-semibold">Upcoming</button>
            <button id="tabPast" onclick="setTab('past')" class="flex-none px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-semibold">Past</button>
        </div>

        <!-- Dynamic events container -->
        <div id="eventsContainer" class="space-y-4">
            <p class="text-center text-slate-400 py-12">Loading events...</p>
        </div>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 px-2 py-3 z-50">
        <div class="flex justify-around items-center max-w-md mx-auto">
            <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="../student_dashboard_2/code.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-medium">Home</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="../student_timetable/code.html">
                <span class="material-symbols-outlined">calendar_today</span>
                <span class="text-[10px] font-medium">Schedule</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-primary" href="#">
                <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">event</span>
                <span class="text-[10px] font-bold">Events</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="../messages_list/code.html">
                <span class="material-symbols-outlined">chat_bubble</span>
                <span class="text-[10px] font-medium">Messages</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="../student_profile/code.html">
                <span class="material-symbols-outlined">person_outline</span>
                <span class="text-[10px] font-medium">Profile</span>
            </a>
        </div>
    </nav>

    <script>
        const BASE_URL = 'http://169.239.251.102:280/~tomoh.ikfingeh/uploads';

        function openEvent(id) {
            sessionStorage.setItem('sl_event_id', id);
            window.location.href = '../event_detail/code.html';
        }

        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function fmtDate(dt) {
            if (!dt) return '';
            const d = new Date(dt);
            return d.toLocaleDateString('en-US', {
                month: 'short',
                day: '2-digit'
            }).toUpperCase();
        }

        function fmtTime(dt) {
            if (!dt) return '';
            const d = new Date(dt);
            return d.toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit'
            });
        }

        function statusBadge(e) {
            if (new Date(e.eventDate) < new Date()) return '<span class="px-2 py-0.5 bg-slate-100 text-slate-500 text-[10px] font-bold rounded uppercase">Ended</span>';
            if (e.spotsLeft === 0) return '<span class="px-2 py-0.5 bg-red-100 text-red-700 text-[10px] font-bold rounded uppercase">Full</span>';
            if (e.spotsLeft <= 5) return '<span class="px-2 py-0.5 bg-orange-100 text-orange-700 text-[10px] font-bold rounded uppercase">Limited</span>';
            return '<span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 text-[10px] font-bold rounded uppercase">Open</span>';
        }

        function renderCard(e) {
            return `
        <div onclick="openEvent('${escHtml(e.id)}')" class="flex bg-white dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-800 shadow-sm overflow-hidden cursor-pointer hover:shadow-md transition-shadow">
            <div class="w-28 flex-shrink-0 relative bg-primary/10">
                <div class="w-full h-full flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary/30 text-4xl">event</span>
                </div>
                <div class="absolute top-2 left-2 bg-primary text-white text-[10px] font-bold px-2 py-1 rounded">${fmtDate(e.eventDate)}</div>
            </div>
            <div class="p-4 flex flex-col justify-between flex-1">
                <div>
                    <p class="text-[10px] font-bold uppercase tracking-wide text-primary dark:text-blue-400">${escHtml(e.type || 'Event')}</p>
                    <h3 class="font-bold text-sm mt-0.5 leading-tight">${escHtml(e.title)}</h3>
                </div>
                <div class="space-y-1 mt-2">
                    <div class="flex items-center gap-1.5 text-slate-500 text-xs">
                        <span class="material-symbols-outlined text-[14px]">schedule</span>
                        <span>${fmtTime(e.eventDate)}</span>
                    </div>
                    <div class="flex items-center gap-1.5 text-slate-500 text-xs">
                        <span class="material-symbols-outlined text-[14px]">location_on</span>
                        <span>${escHtml(e.location)}</span>
                    </div>
                </div>
                <div class="flex items-center justify-between mt-3">
                    ${statusBadge(e)}
                    <span class="text-xs text-slate-400">${e.signedUpCount} / ${e.capacity} attending</span>
                </div>
            </div>
        </div>`;
        }

        async function loadEvents(tab) {
            const token = localStorage.getItem('sl_token');
            if (!token) {
                window.location.href = '../login_screen/code.html';
                return;
            }
            const container = document.getElementById('eventsContainer');
            container.innerHTML = '<p class="text-center text-slate-400 py-12 col-span-full">Loading events...</p>';
            try {
                const res = await fetch(`${BASE_URL}/api/events/list.php?tab=${tab}`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                const data = await res.json();
                if (!res.ok) {
                    container.innerHTML = `<p class="text-center text-red-500 py-12">${escHtml(data.error || 'Failed to load events')}</p>`;
                    return;
                }
                if (!data.events.length) {
                    container.innerHTML = '<p class="text-center text-slate-400 py-12">No events found.</p>';
                    return;
                }
                const upcoming = data.events.filter(e => new Date(e.eventDate) >= new Date());
                const past = data.events.filter(e => new Date(e.eventDate) < new Date());
                let html = '';
                if (upcoming.length) {
                    html += `<div class="flex items-center justify-between mb-3"><h2 class="text-base font-bold">Upcoming</h2><span class="text-xs text-slate-500">${upcoming.length} events</span></div>`;
                    html += '<div class="space-y-4 mb-8">' + upcoming.map(renderCard).join('') + '</div>';
                }
                if (past.length) {
                    html += `<div class="flex items-center justify-between mb-3"><h2 class="text-base font-bold text-slate-500">Past Events</h2><span class="text-xs text-slate-400">${past.length} events</span></div>`;
                    html += '<div class="space-y-4 opacity-60">' + past.map(renderCard).join('') + '</div>';
                }
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<p class="text-center text-red-500 py-12">Connection error. Please try again.</p>';
            }
        }

        function setTab(tab) {
            ['all', 'upcoming', 'past'].forEach(t => {
                const btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
                if (btn) btn.className = t === tab ?
                    'flex-none px-4 py-2 rounded-full bg-primary text-white text-xs font-bold' :
                    'flex-none px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-semibold';
            });
            loadEvents(tab);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadEvents('all');
        });
    </script>
</body>

</html>
