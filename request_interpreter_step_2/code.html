<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Request Interpreter - Date &amp; Time</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003366",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="max-w-md mx-auto bg-white dark:bg-slate-900 min-h-screen shadow-xl flex flex-col">
        <!-- Top Navigation -->
        <div class="flex items-center p-4 border-b border-slate-100 dark:border-slate-800">
            <button class="text-primary p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
            <h1 class="flex-1 text-center font-bold text-lg">Interpreter Request</h1>
            <div class="w-10"></div>
            <!-- Spacer for symmetry -->
        </div>
        <!-- Progress Indicator -->
        <div class="p-6">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold text-primary">Step 2 of 4</span>
                <span class="text-sm text-slate-500">Date &amp; Time</span>
            </div>
            <div class="w-full bg-slate-200 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
                <div class="bg-primary h-full rounded-full" style="width: 50%;"></div>
            </div>
        </div>
        <!-- Main Content -->
        <div class="flex-1 px-6 pb-24">
            <h2 class="text-2xl font-bold mb-6">When is the event?</h2>
            <!-- Date Selection Section -->
            <div class="mb-8">
                <label class="block text-sm font-bold mb-3 uppercase tracking-wider text-slate-500">Select Date</label>
                <div class="bg-background-light dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700">
                    <div class="flex items-center justify-between mb-4">
                        <button class="material-symbols-outlined text-primary">chevron_left</button>
                        <span class="font-bold">October 2023</span>
                        <button class="material-symbols-outlined text-primary">chevron_right</button>
                    </div>
                    <div class="grid grid-cols-7 gap-1 text-center mb-2">
                        <div class="text-[10px] font-bold text-slate-400">S</div>
                        <div class="text-[10px] font-bold text-slate-400">M</div>
                        <div class="text-[10px] font-bold text-slate-400">T</div>
                        <div class="text-[10px] font-bold text-slate-400">W</div>
                        <div class="text-[10px] font-bold text-slate-400">T</div>
                        <div class="text-[10px] font-bold text-slate-400">F</div>
                        <div class="text-[10px] font-bold text-slate-400">S</div>
                    </div>
                    <div class="grid grid-cols-7 gap-1 text-center">
                        <!-- Placeholder calendar days -->
                        <div class="h-10 flex items-center justify-center text-slate-300">24</div>
                        <div class="h-10 flex items-center justify-center text-slate-300">25</div>
                        <div class="h-10 flex items-center justify-center text-slate-300">26</div>
                        <div class="h-10 flex items-center justify-center text-slate-300">27</div>
                        <div class="h-10 flex items-center justify-center text-slate-300">28</div>
                        <div class="h-10 flex items-center justify-center text-slate-300">29</div>
                        <div class="h-10 flex items-center justify-center text-slate-300">30</div>
                        <button class="h-10 rounded-full hover:bg-primary/10 transition-colors">1</button>
                        <button class="h-10 rounded-full hover:bg-primary/10 transition-colors">2</button>
                        <button class="h-10 rounded-full hover:bg-primary/10 transition-colors">3</button>
                        <button class="h-10 rounded-full hover:bg-primary/10 transition-colors">4</button>
                        <button class="h-10 rounded-full bg-primary text-white font-bold">5</button>
                        <button class="h-10 rounded-full hover:bg-primary/10 transition-colors">6</button>
                        <button class="h-10 rounded-full hover:bg-primary/10 transition-colors">7</button>
                        <button class="h-10 rounded-full hover:bg-primary/10 transition-colors">8</button>
                        <button class="h-10 rounded-full hover:bg-primary/10 transition-colors">9</button>
                        <button class="h-10 rounded-full hover:bg-primary/10 transition-colors">10</button>
                        <button class="h-10 rounded-full hover:bg-primary/10 transition-colors">11</button>
                    </div>
                </div>
            </div>
            <!-- Time Selection Section -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div>
                    <label class="block text-sm font-bold mb-2 uppercase tracking-wider text-slate-500">Start Time</label>
                    <div class="relative">
                        <input class="w-full bg-background-light dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg p-3 text-sm focus:ring-primary focus:border-primary" type="time" value="09:00" />
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 uppercase tracking-wider text-slate-500">End Time</label>
                    <div class="relative">
                        <input class="w-full bg-background-light dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg p-3 text-sm focus:ring-primary focus:border-primary" type="time" value="11:00" />
                    </div>
                </div>
            </div>
            <!-- Recurring Option -->
            <div class="bg-primary/5 dark:bg-primary/10 border border-primary/20 rounded-xl p-4 flex items-center justify-between mb-8">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary">event_repeat</span>
                    <div>
                        <p class="font-bold text-sm">Recurring event?</p>
                        <p class="text-xs text-slate-500">For classes or repeating sessions</p>
                    </div>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
            </div>
        </div>
        <!-- Fixed Footer Action -->
        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800">
            <a href="../request_review_submit/code.html" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg active:scale-[0.98]">
                Next Step
                <span class="material-symbols-outlined">arrow_forward</span>
</a>
        </div>
    </div>
</body>

</html>
