<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Request Interpreter - Step 2</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003366",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Top Navigation Bar -->
    <header class="sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center p-4 justify-between max-w-2xl mx-auto w-full">
            <button class="text-primary flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
            <h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Select Date &amp; Time</h1>
        </div>
        <!-- Progress Indicator -->
        <div class="flex flex-col gap-2 px-6 pb-4 max-w-2xl mx-auto w-full">
            <div class="flex justify-between items-center">
                <p class="text-slate-600 dark:text-slate-400 text-sm font-medium">Request Progress</p>
                <p class="text-primary text-sm font-bold">Step 2 of 3</p>
            </div>
            <div class="w-full bg-slate-200 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
                <div class="bg-primary h-full w-[66%] rounded-full"></div>
            </div>
        </div>
    </header>
    <main class="flex-1 w-full max-w-2xl mx-auto p-4 space-y-6">
        <!-- Calendar Section -->
        <section class="bg-white dark:bg-slate-900 rounded-xl p-4 shadow-sm border border-slate-200 dark:border-slate-800">
            <div class="flex items-center justify-between mb-4 px-2">
                <h2 class="text-slate-900 dark:text-slate-100 font-bold text-lg">October 2024</h2>
                <div class="flex gap-2">
                    <button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">chevron_left</span>
</button>
                    <button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">chevron_right</span>
</button>
                </div>
            </div>
            <div class="grid grid-cols-7 text-center mb-2">
                <div class="text-xs font-bold text-slate-400 uppercase py-2">S</div>
                <div class="text-xs font-bold text-slate-400 uppercase py-2">M</div>
                <div class="text-xs font-bold text-slate-400 uppercase py-2">T</div>
                <div class="text-xs font-bold text-slate-400 uppercase py-2">W</div>
                <div class="text-xs font-bold text-slate-400 uppercase py-2">T</div>
                <div class="text-xs font-bold text-slate-400 uppercase py-2">F</div>
                <div class="text-xs font-bold text-slate-400 uppercase py-2">S</div>
                <!-- Calendar Days Mockup -->
                <button class="h-10 w-full flex items-center justify-center rounded-lg text-slate-300 cursor-not-allowed">29</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg text-slate-300 cursor-not-allowed">30</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">1</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">2</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">3</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">4</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg bg-primary text-white font-bold shadow-md shadow-primary/20">5</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">6</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">7</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">8</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">9</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">10</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">11</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">12</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">13</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">14</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">15</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">16</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">17</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">18</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">19</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">20</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">21</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">22</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">23</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">24</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">25</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">26</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">27</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">28</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">29</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">30</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg hover:bg-primary/5">31</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg text-slate-300 cursor-not-allowed">1</button>
                <button class="h-10 w-full flex items-center justify-center rounded-lg text-slate-300 cursor-not-allowed">2</button>
            </div>
        </section>
        <!-- Time Selection Section -->
        <section class="space-y-4">
            <div class="flex items-center justify-between">
                <h3 class="text-slate-900 dark:text-slate-100 font-bold text-lg">Start Time</h3>
                <span class="px-2 py-1 bg-primary/10 text-primary text-xs font-semibold rounded-md flex items-center gap-1">
<span class="material-symbols-outlined text-sm">schedule</span> PST Timezone
                </span>
            </div>
            <div class="bg-white dark:bg-slate-900 rounded-xl p-4 shadow-sm border border-slate-200 dark:border-slate-800 flex gap-4">
                <div class="flex-1 flex flex-col items-center">
                    <span class="text-xs text-slate-400 font-bold mb-2">HOUR</span>
                    <div class="flex flex-col gap-1 w-full">
                        <button class="py-2 text-slate-400 font-medium">02</button>
                        <button class="py-2 bg-primary/5 text-primary font-bold rounded-lg border border-primary/20">03</button>
                        <button class="py-2 text-slate-400 font-medium">04</button>
                    </div>
                </div>
                <div class="flex flex-col justify-center pt-6 text-2xl font-bold text-slate-300">:</div>
                <div class="flex-1 flex flex-col items-center">
                    <span class="text-xs text-slate-400 font-bold mb-2">MINUTE</span>
                    <div class="flex flex-col gap-1 w-full">
                        <button class="py-2 text-slate-400 font-medium">00 PM</button>
                        <button class="py-2 bg-primary/5 text-primary font-bold rounded-lg border border-primary/20">15 PM</button>
                        <button class="py-2 text-slate-400 font-medium">30 PM</button>
                    </div>
                </div>
            </div>
        </section>
        <!-- Duration Section -->
        <section class="space-y-3">
            <h3 class="text-slate-900 dark:text-slate-100 font-bold text-lg">Estimated Duration</h3>
            <div class="grid grid-cols-3 gap-3">
                <button class="py-3 px-2 rounded-lg border-2 border-primary bg-primary/5 text-primary font-bold text-sm">30 min</button>
                <button class="py-3 px-2 rounded-lg border-2 border-slate-200 dark:border-slate-800 hover:border-primary/50 text-slate-600 dark:text-slate-400 font-medium text-sm transition-all">1 hour</button>
                <button class="py-3 px-2 rounded-lg border-2 border-slate-200 dark:border-slate-800 hover:border-primary/50 text-slate-600 dark:text-slate-400 font-medium text-sm transition-all">2 hours</button>
            </div>
        </section>
        <!-- Summary Banner -->
        <div class="p-4 bg-slate-100 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700/50">
            <div class="flex items-start gap-3">
                <span class="material-symbols-outlined text-primary mt-0.5">info</span>
                <p class="text-sm text-slate-700 dark:text-slate-300 leading-relaxed">
                    Interpreter requested for <span class="font-bold text-slate-900 dark:text-slate-100">Oct 5, 2024</span> at <span class="font-bold text-slate-900 dark:text-slate-100">3:15 PM</span>. Estimated finish: 3:45 PM.
                </p>
            </div>
        </div>
    </main>
    <!-- Fixed Bottom Action Bar -->
    <footer class="sticky bottom-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 p-4">
        <div class="max-w-2xl mx-auto">
            <a href="../request_review_submit/code.html" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                Continue to Final Step
                <span class="material-symbols-outlined">arrow_forward</span>
</a>
        </div>
    </footer>
</body>

</html>
